<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicle - 大人の絵日記帳</title>
    <style>
        :root {
            --bg-color: #f7f5f0;          /* 落ち着いた生成り（アイボリー） */
            --panel-bg: #ffffff;          /* 上質な白リネンをイメージ */
            --text-main: #2c3e50;         /* 深みのあるチャコール */
            --text-muted: #7f8c8d;        /* 静かなグレー */
            --border-color: #e0dbd1;      /* 繊細な細い境界線 */
            --accent-color: #af926b;      /* 洗練された真鍮ゴールド */
            --accent-hover: #8e7350;      /* 深いゴールド */
            --danger-color: #c0392b;      /* 落ち着いたワインレッド */
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Mincho ProN", "Yu Mincho", serif;
            color: var(--text-main);
            margin: 0;
            padding: 40px 10px;
            display: flex;
            justify-content: center;
            letter-spacing: 0.05em;
        }

        /* 3カラム（左・中・右）のデスクトップ用レイアウト */
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 240px 1fr 280px;
                align-items: start;
            }
            .sidebar-left, .sidebar-right {
                position: sticky;
                top: 40px;
            }
        }

        .notebook-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            box-sizing: border-box;
        }

        h2, h3 {
            margin-top: 0;
            color: var(--text-main);
            font-weight: 400;
            font-size: 1.15rem;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .editable-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-color);
            display: inline-block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            background-color: #faf9f6;
            box-sizing: border-box;
            font-size: 0.95rem;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s;
        }
        input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        textarea {
            height: 180px;
            resize: vertical;
            line-height: 1.8;
        }

        .image-preview-area {
            border: 1px dashed var(--accent-color);
            padding: 20px;
            text-align: center;
            background-color: #faf9f6;
            cursor: pointer;
        }
        .image-preview-area img {
            max-width: 100%;
            max-height: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 2px;
            padding: 12px 20px;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }
        button:hover {
            background-color: var(--accent-hover);
        }

        .backup-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            font-size: 0.8rem;
        }
        .backup-btn:hover { background-color: #faf9f6; color: var(--text-main); }
        
        .new-post-btn { background-color: var(--text-main); margin-bottom: 25px; }
        .new-post-btn:hover { background-color: #1a252f; }
        
        .file-input-label {
            display: block;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
        }
        .file-input-label:hover { background-color: #faf9f6; color: var(--text-main); }

        .index-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }
        .index-item {
            padding: 10px 8px;
            border-bottom: 1px solid #f1eee7;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
        .index-item:hover, .index-item.active {
            color: var(--text-main);
            border-bottom-color: var(--accent-color);
            padding-left: 12px;
        }

        .diary-view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        .diary-view-image {
            text-align: center;
            margin-bottom: 30px;
            background-color: #faf9f6;
            padding: 15px;
            border: 1px solid var(--border-color);
        }
        .diary-view-image img {
            max-width: 100%;
            max-height: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .diary-view-text {
            font-size: 1rem;
            line-height: 2;
            white-space: pre-wrap;
            color: var(--text-main);
            min-height: 150px;
        }
        
        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        .delete-btn { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 8px 16px; font-size: 0.8rem; width: auto; }
        .delete-btn:hover { background-color: #fff1f0; color: var(--danger-color); border-color: #ffa39e; }
        .edit-entry-btn { background-color: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 8px 16px; font-size: 0.8rem; width: auto; }
        .edit-entry-btn:hover { background-color: var(--accent-color); color: white; }

        /* --- カレンダー専用のデザイン --- */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-title {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .calendar-nav-btn {
            background: none;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            width: auto;
            font-size: 0.8rem;
        }
        .calendar-nav-btn:hover { background-color: #faf9f6; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-day-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 4px;
        }
        .calendar-cell {
            font-size: 0.8rem;
            padding: 8px 0;
            color: #ccc; /* 今月の外の日付 */
        }
        .calendar-cell.current-month {
            color: var(--text-main);
        }
        /* 日記が存在する日の特別なスタイル */
        .calendar-cell.has-diary {
            background-color: #faf5ed;
            color: var(--accent-color);
            font-weight: bold;
            border: 1px solid var(--accent-color);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calendar-cell.has-diary:hover {
            background-color: var(--accent-color);
            color: white;
        }
        /* 現在表示している日記の日のスタイル */
        .calendar-cell.is-active {
            background-color: var(--text-main) !important;
            color: white !important;
            border-color: var(--text-main) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 左側：サイドバー（目次・管理） -->
    <div class="sidebar-left">
        <div class="notebook-panel">
            <button class="new-post-btn" onclick="showNewForm()">Write a Diary</button>

            <h3>Index</h3>
            <ul class="index-list" id="indexList" style="margin-bottom: 30px;">
                <!-- 目次 -->
            </ul>

            <h3>Management</h3>
            <div>
                <button class="backup-btn" onclick="exportData()">Export (Backup)</button>
                <label class="file-input-label">
                    Import (Restore)
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(this)">
                </label>
            </div>
        </div>
    </div>

    <!-- 中央：メインコンテンツ（日記表示・編集） -->
    <div class="notebook-panel" id="mainPanel">
        <!-- コンテンツエリア -->
    </div>

    <!-- 右側：サイドバー（常時カレンダー） -->
    <div class="sidebar-right">
        <div class="notebook-panel">
            <h3>Calendar</h3>
            <div class="calendar-header">
                <button class="calendar-nav-btn" onclick="moveCalendar(-1)">◀</button>
                <div class="calendar-title" id="calendarTitle">2026.06</div>
                <button class="calendar-nav-btn" onclick="moveCalendar(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- カレンダー本体 -->
            </div>
        </div>
    </div>
</div>

<script>
    let diaryEntries = JSON.parse(localStorage.getItem('diaryEntries')) || [];
    
    const labels = {
        'lbl-date': 'Date',
        'lbl-weather': 'Weather',
        'lbl-image': 'Photograph',
        'lbl-content': 'Chronicle'
    };
    localStorage.setItem('diaryLabels', JSON.stringify(labels));
    
    let currentSelectId = null;
    let tempImageData = "";

    // カレンダーの現在の表示年月
    let calendarYear = new Date().getFullYear();
    let calendarMonth = new Date().getMonth(); // 0 = 1月

    window.onload = function() {
        refreshSidebar();
        if (diaryEntries.length > 0) {
            viewDiary(diaryEntries[0].id);
        } else {
            showNewForm();
            renderCalendar();
        }
    };

    function refreshSidebar() {
        const indexList = document.getElementById('indexList');
        indexList.innerHTML = '';

        if (diaryEntries.length === 0) {
            indexList.innerHTML = '<li style="color:var(--text-muted);font-size:0.8rem;padding:10px 0;">No entries yet.</li>';
            return;
        }

        diaryEntries.forEach((entry, idx) => {
            const pageNum = diaryEntries.length - idx;
            const li = document.createElement('li');
            li.className = `index-item ${entry.id === currentSelectId ? 'active' : ''}`;
            li.innerHTML = `<span>Page.${pageNum}</span> <span>${entry.date}</span>`;
            li.onclick = () => viewDiary(entry.id);
            indexList.appendChild(li);
        });
    }

    // --- カレンダー描画ロジック ---
    function renderCalendar() {
        const title = document.getElementById('calendarTitle');
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        // タイトル設定 (例: 2026.06)
        title.innerText = `${calendarYear}.${String(calendarMonth + 1).padStart(2, '0')}`;

        // 曜日のラベルを追加
        const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
        days.forEach(d => {
            const label = document.createElement('div');
            label.className = 'calendar-day-label';
            label.innerText = d;
            grid.appendChild(label);
        });

        // 月の最初の日と最後の日を取得
        const firstDayIdx = new Date(calendarYear, calendarMonth, 1).getDay();
        const lastDate = new Date(calendarYear, calendarMonth + 1, 0).getDate();
        const prevLastDate = new Date(calendarYear, calendarMonth, 0).getDate();

        // 前月の埋め合わせ
        for (let i = firstDayIdx - 1; i >= 0; i--) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerText = prevLastDate - i;
            grid.appendChild(cell);
        }

        // 当月の日付
        // 表示中の日記の日付を取得
        let activeDateString = "";
        if (currentSelectId) {
            const activeEntry = diaryEntries.find(e => e.id === currentSelectId);
            if (activeEntry) activeDateString = activeEntry.date;
        }

        for (let date = 1; date <= lastDate; date++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell current-month';
            cell.innerText = date;

            // このマスの日付文字列を作る (YYYY-MM-DD)
            const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
            
            // その日の日記があるか探す
            const foundEntry = diaryEntries.find(e => e.date === dateStr);
            if (foundEntry) {
                cell.classList.add('has-diary');
                cell.onclick = () => viewDiary(foundEntry.id);
                
                // 現在開いている日記の日ならさらに強調
                if (dateStr === activeDateString) {
                    cell.classList.add('is-active');
                }
            }
            grid.appendChild(cell);
        }

        // 翌月の埋め合わせ（グリッドを綺麗に整えるため）
        const totalCells = firstDayIdx + lastDate;
        const nextMonthCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let i = 1; i <= nextMonthCells; i++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerText = i;
            grid.appendChild(cell);
        }
    }

    function moveCalendar(direction) {
        calendarMonth += direction;
        if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
        if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
        renderCalendar();
    }

    // 指定した日記を表示
    function viewDiary(id) {
        currentSelectId = id;
        refreshSidebar();

        const entry = diaryEntries.find(e => e.id === id);
        const mainPanel = document.getElementById('mainPanel');
        if (!entry) return;

        // 日記の日付に合わせてカレンダーの表示月を自動変更する
        const entryDate = new Date(entry.date);
        if (!isNaN(entryDate)) {
            calendarYear = entryDate.getFullYear();
            calendarMonth = entryDate.getMonth();
        }
        renderCalendar(); // カレンダー再描画

        const idx = diaryEntries.indexOf(entry);
        const pageNum = diaryEntries.length - idx;
        const imgHtml = entry.image ? `<div class="diary-view-image"><img src="${entry.image}"></div>` : '';

        mainPanel.innerHTML = `
            <h2>Page.${pageNum}</h2>
            <div class="diary-view-header">
                <div>📅 <strong>${labels['lbl-date']}:</strong> ${entry.date}</div>
                <div><strong>${labels['lbl-weather']}:</strong> ${entry.weather}</div>
            </div>
            ${imgHtml}
            <div style="font-size:0.75rem; color:var(--accent-color); margin-bottom:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em;">${labels['lbl-content']}</div>
            <div class="diary-view-text">${entry.content}</div>
            
            <div class="action-buttons">
                <button class="edit-entry-btn" onclick="showEditForm(${entry.id})">Edit Entry</button>
                <button class="delete-btn" onclick="deleteEntry(${entry.id})">Delete</button>
            </div>
        `;
    }

    // 新規作成フォーム
    function showNewForm() {
        currentSelectId = null;
        refreshSidebar();
        tempImageData = "";
        renderCalendar();

        const mainPanel = document.getElementById('mainPanel');
        mainPanel.innerHTML = `
            <h2>New Entry</h2>
            <form id="diaryForm" onsubmit="saveNewDiary(event)">
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-date']}</span>
                    <input type="date" id="diaryDate" required onchange="syncCalendarMonth(this.value)">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-weather']}</span>
                    <select id="diaryWeather">
                        <option value="☀️ Fine">☀️ Fine</option>
                        <option value="☁️ Cloudy">☁️ Cloudy</option>
                        <option value="☔ Rainy">☔ Rainy</option>
                        <option value="☃️ Snowy">☃️ Snowy</option>
                    </select>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-image']}</span>
                    <div class="image-preview-area" onclick="document.getElementById('diaryImage').click()">
                        <span id="previewPlaceholder">Click to select an image</span>
                        <img id="imagePreview" src="" style="display: none;">
                    </div>
                    <input type="file" id="diaryImage" accept="image/*" style="display: none;" onchange="handleFileSelect('imagePreview', 'previewPlaceholder')">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-content']}</span>
                    <textarea id="diaryContent" placeholder="Describe your day..." required></textarea>
                </div>
                <button type="submit">Save to Chronicle</button>
            </form>
        `;
        const todayStr = new Date().toISOString().substring(0, 10);
        document.getElementById('diaryDate').value = todayStr;
        syncCalendarMonth(todayStr);
    }

    // 新規作成時に入力した日付に合わせてカレンダーを動かす
    function syncCalendarMonth(dateValue) {
        const d = new Date(dateValue);
        if(!isNaN(d)) {
            calendarYear = d.getFullYear();
            calendarMonth = d.getMonth();
            renderCalendar();
        }
    }

    // 編集フォーム
    function showEditForm(id) {
        const entry = diaryEntries.find(e => e.id === id);
        if (!entry) return;

        tempImageData = entry.image;
        const mainPanel = document.getElementById('mainPanel');
        
        mainPanel.innerHTML = `
            <h2>Edit Page.${diaryEntries.length - diaryEntries.indexOf(entry)}</h2>
            <form id="diaryForm" onsubmit="saveEditDiary(event, ${id})">
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-date']}</span>
                    <input type="date" id="diaryDate" value="${entry.date}" required>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-weather']}</span>
                    <select id="diaryWeather">
                        <option value="☀️ Fine" ${entry.weather.includes('Fine')||entry.weather.includes('晴れ')?'selected':''}>☀️ Fine</option>
                        <option value="☁️ Cloudy" ${entry.weather.includes('Cloudy')||entry.weather.includes('曇り')?'selected':''}>☁️ Cloudy</option>
                        <option value="☔ Rainy" ${entry.weather.includes('Rainy')||entry.weather.includes('雨')?'selected':''}>☔ Rainy</option>
                        <option value="☃️ Snowy" ${entry.weather.includes('Snowy')||entry.weather.includes('雪')?'selected':''}>☃️ Snowy</option>
                    </select>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-image']}</span>
                    <div class="image-preview-area" onclick="document.getElementById('diaryImage').click()">
                        <span id="previewPlaceholder" style="${entry.image?'display:none;':''}">Click to select an image</span>
                        <img id="imagePreview" src="${entry.image || ''}" style="${entry.image?'display:block;':'display:none;'}">
                    </div>
                    <input type="file" id="diaryImage" accept="image/*" style="display: none;" onchange="handleFileSelect('imagePreview', 'previewPlaceholder')">
                    <div style="margin-top:10px;">
                        <button type="button" class="delete-btn" style="padding:6px 12px;" onclick="removeImage()">Remove Photograph</button>
                    </div>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-content']}</span>
                    <textarea id="diaryContent" required>${entry.content}</textarea>
                </div>
                <div class="action-buttons" style="border:none; padding:0; margin:0;">
                    <button type="submit">Save Changes</button>
                    <button type="button" class="delete-btn" style="padding:12px 20px; border-radius:2px;" onclick="viewDiary(${id})">Cancel</button>
                </div>
            </form>
        `;
    }

    function handleFileSelect(imgId, placeholderId) {
        const file = document.getElementById('diaryImage').files[0];
        const reader = new FileReader();
        reader.onloadend = function () {
            document.getElementById(imgId).src = reader.result;
            document.getElementById(imgId).style.display = 'block';
            document.getElementById(placeholderId).style.display = 'none';
            tempImageData = reader.result;
        }
        if (file) reader.readAsDataURL(file);
    }

    function removeImage() {
        tempImageData = "";
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('previewPlaceholder').style.display = 'block';
    }

    function saveNewDiary(e) {
        e.preventDefault();
        const newEntry = {
            id: Date.now(),
            date: document.getElementById('diaryDate').value,
            weather: document.getElementById('diaryWeather').value,
            image: tempImageData,
            content: document.getElementById('diaryContent').value
        };
        diaryEntries.unshift(newEntry);
        diaryEntries.sort((a,b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('diaryEntries', JSON.stringify(diaryEntries));
        viewDiary(newEntry.id);
    }

    function saveEditDiary(e, id) {
        e.preventDefault();
        const entry = diaryEntries.find(e => e.id === id);
        if (!entry) return;

        entry.date = document.getElementById('diaryDate').value;
        entry.weather = document.getElementById('diaryWeather').value;
        entry.content = document.getElementById('diaryContent').value;
        entry.image = tempImageData;

        diaryEntries.sort((a,b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('diaryEntries', JSON.stringify(diaryEntries));
        viewDiary(id);
    }

    function deleteEntry(id) {
        if (confirm('Are you sure you want to delete this entry?')) {
            diaryEntries = diaryEntries.filter(entry => entry.id !== id);
            localStorage.setItem('diaryEntries', JSON.stringify(diaryEntries));
            if (diaryEntries.length > 0) {
                viewDiary(diaryEntries[0].id);
            } else {
                showNewForm();
            }
        }
    }

    function exportData() {
        if (diaryEntries.length === 0) { alert("No data to export."); return; }
        const backupData = { entries: diaryEntries, labels: labels };
        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `chronicle_backup_${new Date().toISOString().substring(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        if (!confirm("Import this file? Existing data will be overwritten.")) { input.value = ""; return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.entries) {
                    diaryEntries = importedData.entries;
                    localStorage.setItem('diaryEntries', JSON.stringify(diaryEntries));
                    refreshSidebar();
                    if (diaryEntries.length > 0) {
                        viewDiary(diaryEntries[0].id);
                    } else {
                        showNewForm();
                    }
                    alert("Data successfully imported.");
                } else { alert("Invalid file format."); }
            } catch (err) { alert("An error occurred during import."); }
            input.value = "";
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
