<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronicle - 多機能絵日記帳</title>
    <style>
        :root {
            --bg-color: #f7f5f0;          /* 落ち着いた生成り（アイボリー） */
            --panel-bg: #ffffff;          /* 上質な白リネンをイメージ */
            --text-main: #2c3e50;         /* 深みのあるチャコール */
            --text-muted: #7f8c8d;        /* 静かなグレー */
            --border-color: #e0dbd1;      /* 繊細な細い境界線 */
            --accent-color: #af926b;      /* 洗練された真鍮ゴールド */
            --accent-hover: #8e7350;      /* 深いゴールド */
            --danger-color: #c0392b;      /* 落ち着いたワインレッド */
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "Hiragino Mincho ProN", "Yu Mincho", serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px 40px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            letter-spacing: 0.05em;
        }

        /* --- ノート切り替えタブのスタイル --- */
        .notebook-tabs-container {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .notebook-tabs {
            display: flex;
            flex-wrap: wrap;
            border: 1px solid var(--border-color);
            background-color: var(--panel-bg);
            border-radius: 4px;
            overflow: hidden;
        }
        .notebook-tab {
            flex: 1;
            min-width: 150px;
            padding: 15px 20px;
            font-size: 0.95rem;
            color: var(--text-muted);
            background-color: transparent;
            border: none;
            border-right: 1px solid var(--border-color);
            border-radius: 0;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            text-transform: none; /* 大文字強制を解除 */
        }
        .notebook-tab:hover {
            background-color: #faf9f6;
            color: var(--text-main);
        }
        .notebook-tab.active {
            background-color: #fff;
            color: var(--text-main);
            font-weight: bold;
            box-shadow: inset 0 -3px 0 var(--accent-color);
        }
        .notebook-tab-add {
            background-color: #faf9f6;
            color: var(--text-muted);
            justify-content: center;
            font-weight: normal;
            max-width: 200px;
        }
        .notebook-tab-add:hover {
            background-color: #f1eee7;
            color: var(--text-main);
        }
        .notebook-tab-rename-btn {
            font-size: 0.75rem;
            color: var(--accent-color);
            background: none;
            border: none;
            padding: 2px 6px;
            width: auto;
            cursor: pointer;
            opacity: 0.5;
        }
        .notebook-tab:hover .notebook-tab-rename-btn {
            opacity: 1;
        }

        /* 全体コンテナ */
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 240px 1fr 280px;
                align-items: start;
            }
            .sidebar-left, .sidebar-right {
                position: sticky;
                top: 20px;
            }
        }

        .notebook-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            box-sizing: border-box;
        }

        h2, h3 {
            margin-top: 0;
            color: var(--text-main);
            font-weight: 400;
            font-size: 1.15rem;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .editable-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-color);
            display: inline-block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        input[type="date"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            background-color: #faf9f6;
            box-sizing: border-box;
            font-size: 0.95rem;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s;
        }
        input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        textarea {
            height: 180px;
            resize: vertical;
            line-height: 1.8;
        }

        .image-preview-area {
            border: 1px dashed var(--accent-color);
            padding: 20px;
            text-align: center;
            background-color: #faf9f6;
            cursor: pointer;
        }
        .image-preview-area img {
            max-width: 100%;
            max-height: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 2px;
            padding: 12px 20px;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            text-transform: uppercase;
        }
        button:hover {
            background-color: var(--accent-hover);
        }

        .backup-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            font-size: 0.8rem;
        }
        .backup-btn:hover { background-color: #faf9f6; color: var(--text-main); }
        
        .new-post-btn { background-color: var(--text-main); margin-bottom: 25px; }
        .new-post-btn:hover { background-color: #1a252f; }
        
        .file-input-label {
            display: block;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
        }
        .file-input-label:hover { background-color: #faf9f6; color: var(--text-main); }

        .index-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
        }
        .index-item {
            padding: 10px 8px;
            border-bottom: 1px solid #f1eee7;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
        .index-item:hover, .index-item.active {
            color: var(--text-main);
            border-bottom-color: var(--accent-color);
            padding-left: 12px;
        }

        .diary-view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        .diary-view-image {
            text-align: center;
            margin-bottom: 30px;
            background-color: #faf9f6;
            padding: 15px;
            border: 1px solid var(--border-color);
        }
        .diary-view-image img {
            max-width: 100%;
            max-height: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .diary-view-text {
            font-size: 1rem;
            line-height: 2;
            white-space: pre-wrap;
            color: var(--text-main);
            min-height: 150px;
        }
        
        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        .delete-btn { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 8px 16px; font-size: 0.8rem; width: auto; }
        .delete-btn:hover { background-color: #fff1f0; color: var(--danger-color); border-color: #ffa39e; }
        .edit-entry-btn { background-color: transparent; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 8px 16px; font-size: 0.8rem; width: auto; }
        .edit-entry-btn:hover { background-color: var(--accent-color); color: white; }

        /* カレンダー */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-title {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .calendar-nav-btn {
            background: none;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            width: auto;
            font-size: 0.8rem;
        }
        .calendar-nav-btn:hover { background-color: #faf9f6; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        .calendar-day-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 4px;
        }
        .calendar-cell {
            font-size: 0.8rem;
            padding: 8px 0;
            color: #ccc;
        }
        .calendar-cell.current-month {
            color: var(--text-main);
        }
        .calendar-cell.has-diary {
            background-color: #faf5ed;
            color: var(--accent-color);
            font-weight: bold;
            border: 1px solid var(--accent-color);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .calendar-cell.has-diary:hover {
            background-color: var(--accent-color);
            color: white;
        }
        .calendar-cell.is-active {
            background-color: var(--text-main) !important;
            color: white !important;
            border-color: var(--text-main) !important;
        }
    </style>
</head>
<body>

<!-- 最上部：日記切り替えメニュー（タブ型） -->
<div class="notebook-tabs-container">
    <div class="notebook-tabs" id="notebookTabs">
        <!-- タブがここに動的に生成されます -->
    </div>
</div>

<div class="container">
    <!-- 左側：サイドバー（目次・管理） -->
    <div class="sidebar-left">
        <div class="notebook-panel">
            <button class="new-post-btn" onclick="showNewForm()">Write a Diary</button>

            <h3>Index</h3>
            <ul class="index-list" id="indexList" style="margin-bottom: 30px;">
                <!-- 目次 -->
            </ul>

            <h3>Management</h3>
            <div>
                <button class="backup-btn" onclick="exportData()">Export (Backup)</button>
                <label class="file-input-label">
                    Import (Restore)
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(this)">
                </label>
            </div>
        </div>
    </div>

    <!-- 中央：メインコンテンツ -->
    <div class="notebook-panel" id="mainPanel">
        <!-- コンテンツエリア -->
    </div>

    <!-- 右側：サイドバー（常時カレンダー） -->
    <div class="sidebar-right">
        <div class="notebook-panel">
            <h3>Calendar</h3>
            <div class="calendar-header">
                <button class="calendar-nav-btn" onclick="moveCalendar(-1)">◀</button>
                <div class="calendar-title" id="calendarTitle">2026.06</div>
                <button class="calendar-nav-btn" onclick="moveCalendar(1)">▶</button>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- カレンダー本体 -->
            </div>
        </div>
    </div>
</div>

<script>
    // 複数ノート管理用のデータ構造
    // データの初期化 (データがない場合は初期の日記1を作成)
    let notebooks = JSON.parse(localStorage.getItem('chronicle_notebooks')) || [
        { id: 'nb_default', name: '日記1', entries: [] }
    ];
    let currentNotebookId = localStorage.getItem('chronicle_current_nb_id') || 'nb_default';

    // 固定英語ラベル
    const labels = { 'lbl-date': 'Date', 'lbl-weather': 'Weather', 'lbl-image': 'Photograph', 'lbl-content': 'Chronicle' };
    
    let currentSelectId = null;
    let tempImageData = "";

    let calendarYear = new Date().getFullYear();
    let calendarMonth = new Date().getMonth();

    window.onload = function() {
        // 万が一現在のノートIDが存在しない場合、安全な値にフォールバック
        if (!notebooks.find(nb => nb.id === currentNotebookId)) {
            currentNotebookId = notebooks[0].id;
        }
        renderTabs();
        refreshSidebar();
        
        const currentEntries = getCurrentEntries();
        if (currentEntries.length > 0) {
            viewDiary(currentEntries[0].id);
        } else {
            showNewForm();
            renderCalendar();
        }
    };

    // 現在選択されているノートの全日記データを取得するヘルパー
    function getCurrentEntries() {
        const nb = notebooks.find(n => n.id === currentNotebookId);
        return nb ? nb.entries : [];
    }

    // データをローカルストレージに一元保存する関数
    function saveAllData() {
        localStorage.setItem('chronicle_notebooks', JSON.stringify(notebooks));
        localStorage.setItem('chronicle_current_nb_id', currentNotebookId);
    }

    // --- タブメニューの描画機能 ---
    function renderTabs() {
        const container = document.getElementById('notebookTabs');
        container.innerHTML = '';

        notebooks.forEach(nb => {
            const btn = document.createElement('button');
            btn.className = `notebook-tab ${nb.id === currentNotebookId ? 'active' : ''}`;
            
            // タブのテキスト部分
            const textSpan = document.createElement('span');
            textSpan.innerText = nb.name;
            textSpan.style.cursor = 'pointer';
            textSpan.onclick = () => switchNotebook(nb.id);
            btn.appendChild(textSpan);

            // 編集用ボタン (⚙️アイコン)
            const renameBtn = document.createElement('span');
            renameBtn.className = 'notebook-tab-rename-btn';
            renameBtn.innerHTML = '⚙️';
            renameBtn.title = '名前の変更 / 削除';
            renameBtn.onclick = (e) => {
                e.stopPropagation(); // 切り替えイベントを防ぐ
                manageNotebookPrompt(nb.id);
            };
            btn.appendChild(renameBtn);

            container.appendChild(btn);
        });

        // 「日記を追加」タブを追加
        const addBtn = document.createElement('button');
        addBtn.className = 'notebook-tab notebook-tab-add';
        addBtn.innerText = '＋ 日記を追加';
        addBtn.onclick = addNotebook;
        container.appendChild(addBtn);
    }

    // ノートの切り替え
    function switchNotebook(id) {
        currentNotebookId = id;
        currentSelectId = null;
        saveAllData();
        renderTabs();
        refreshSidebar();
        
        const currentEntries = getCurrentEntries();
        if (currentEntries.length > 0) {
            viewDiary(currentEntries[0].id);
        } else {
            showNewForm();
            renderCalendar();
        }
    }

    // 新しい日記（ノート）を追加
    function addNotebook() {
        const name = prompt("新しい日記（ノート）の名前を入力してください:", `日記${notebooks.length + 1}`);
        if (!name || name.trim() === "") return;

        const newId = 'nb_' + Date.now();
        notebooks.push({
            id: newId,
            name: name.trim(),
            entries: []
        });
        
        currentNotebookId = newId;
        saveAllData();
        switchNotebook(newId);
    }

    // ノート名の編集・削除メニュー
    function manageNotebookPrompt(id) {
        const nb = notebooks.find(n => n.id === id);
        if (!nb) return;

        const action = prompt(`【${nb.name}】の管理\n\n1: 名前を変更する\n2: この日記帳を丸ごと削除する\n\n番号を入力してください:`, "1");
        
        if (action === "1") {
            const newName = prompt("新しい日記の名前を入力してください:", nb.name);
            if (newName && newName.trim() !== "") {
                nb.name = newName.trim();
                saveAllData();
                renderTabs();
            }
        } else if (action === "2") {
            if (notebooks.length <= 1) {
                alert("これ以上日記帳を削除することはできません。最低1つの日記帳が必要です。");
                return;
            }
            if (confirm(`本当に「${nb.name}」を中の日記データも含めてすべて削除しますか？\nこの操作は取り消せません。`)) {
                notebooks = notebooks.filter(n => n.id !== id);
                if (currentNotebookId === id) {
                    currentNotebookId = notebooks[0].id;
                }
                saveAllData();
                switchNotebook(currentNotebookId);
            }
        }
    }

    // --- 日記帳の標準機能のアップデート（選択中ノートへの連動） ---

    function refreshSidebar() {
        const indexList = document.getElementById('indexList');
        indexList.innerHTML = '';
        const currentEntries = getCurrentEntries();

        if (currentEntries.length === 0) {
            indexList.innerHTML = '<li style="color:var(--text-muted);font-size:0.8rem;padding:10px 0;">No entries yet.</li>';
            return;
        }

        currentEntries.forEach((entry, idx) => {
            const pageNum = currentEntries.length - idx;
            const li = document.createElement('li');
            li.className = `index-item ${entry.id === currentSelectId ? 'active' : ''}`;
            li.innerHTML = `<span>Page.${pageNum}</span> <span>${entry.date}</span>`;
            li.onclick = () => viewDiary(entry.id);
            indexList.appendChild(li);
        });
    }

    function renderCalendar() {
        const title = document.getElementById('calendarTitle');
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        title.innerText = `${calendarYear}.${String(calendarMonth + 1).padStart(2, '0')}`;

        const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
        days.forEach(d => {
            const label = document.createElement('div');
            label.className = 'calendar-day-label';
            label.innerText = d;
            grid.appendChild(label);
        });

        const firstDayIdx = new Date(calendarYear, calendarMonth, 1).getDay();
        const lastDate = new Date(calendarYear, calendarMonth + 1, 0).getDate();
        const prevLastDate = new Date(calendarYear, calendarMonth, 0).getDate();

        for (let i = firstDayIdx - 1; i >= 0; i--) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerText = prevLastDate - i;
            grid.appendChild(cell);
        }

        let activeDateString = "";
        const currentEntries = getCurrentEntries();
        if (currentSelectId) {
            const activeEntry = currentEntries.find(e => e.id === currentSelectId);
            if (activeEntry) activeDateString = activeEntry.date;
        }

        for (let date = 1; date <= lastDate; date++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell current-month';
            cell.innerText = date;

            const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
            
            const foundEntry = currentEntries.find(e => e.date === dateStr);
            if (foundEntry) {
                cell.classList.add('has-diary');
                cell.onclick = () => viewDiary(foundEntry.id);
                if (dateStr === activeDateString) {
                    cell.classList.add('is-active');
                }
            }
            grid.appendChild(cell);
        }

        const totalCells = firstDayIdx + lastDate;
        const nextMonthCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let i = 1; i <= nextMonthCells; i++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-cell';
            cell.innerText = i;
            grid.appendChild(cell);
        }
    }

    function moveCalendar(direction) {
        calendarMonth += direction;
        if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
        if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
        renderCalendar();
    }

    function viewDiary(id) {
        currentSelectId = id;
        refreshSidebar();

        const currentEntries = getCurrentEntries();
        const entry = currentEntries.find(e => e.id === id);
        const mainPanel = document.getElementById('mainPanel');
        if (!entry) return;

        const entryDate = new Date(entry.date);
        if (!isNaN(entryDate)) {
            calendarYear = entryDate.getFullYear();
            calendarMonth = entryDate.getMonth();
        }
        renderCalendar();

        const idx = currentEntries.indexOf(entry);
        const pageNum = currentEntries.length - idx;
        const imgHtml = entry.image ? `<div class="diary-view-image"><img src="${entry.image}"></div>` : '';

        mainPanel.innerHTML = `
            <h2>Page.${pageNum}</h2>
            <div class="diary-view-header">
                <div>📅 <strong>${labels['lbl-date']}:</strong> ${entry.date}</div>
                <div><strong>${labels['lbl-weather']}:</strong> ${entry.weather}</div>
            </div>
            ${imgHtml}
            <div style="font-size:0.75rem; color:var(--accent-color); margin-bottom:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.1em;">${labels['lbl-content']}</div>
            <div class="diary-view-text">${entry.content}</div>
            
            <div class="action-buttons">
                <button class="edit-entry-btn" onclick="showEditForm(${entry.id})">Edit Entry</button>
                <button class="delete-btn" onclick="deleteEntry(${entry.id})">Delete</button>
            </div>
        `;
    }

    function showNewForm() {
        currentSelectId = null;
        refreshSidebar();
        tempImageData = "";
        renderCalendar();

        const mainPanel = document.getElementById('mainPanel');
        mainPanel.innerHTML = `
            <h2>New Entry</h2>
            <form id="diaryForm" onsubmit="saveNewDiary(event)">
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-date']}</span>
                    <input type="date" id="diaryDate" required onchange="syncCalendarMonth(this.value)">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-weather']}</span>
                    <select id="diaryWeather">
                        <option value="☀️ Fine">☀️ Fine</option>
                        <option value="☁️ Cloudy">☁️ Cloudy</option>
                        <option value="☔ Rainy">☔ Rainy</option>
                        <option value="☃️ Snowy">☃️ Snowy</option>
                    </select>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-image']}</span>
                    <div class="image-preview-area" onclick="document.getElementById('diaryImage').click()">
                        <span id="previewPlaceholder">Click to select an image</span>
                        <img id="imagePreview" src="" style="display: none;">
                    </div>
                    <input type="file" id="diaryImage" accept="image/*" style="display: none;" onchange="handleFileSelect('imagePreview', 'previewPlaceholder')">
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-content']}</span>
                    <textarea id="diaryContent" placeholder="Describe your day..." required></textarea>
                </div>
                <button type="submit">Save to Chronicle</button>
            </form>
        `;
        const todayStr = new Date().toISOString().substring(0, 10);
        document.getElementById('diaryDate').value = todayStr;
        syncCalendarMonth(todayStr);
    }

    function syncCalendarMonth(dateValue) {
        const d = new Date(dateValue);
        if(!isNaN(d)) {
            calendarYear = d.getFullYear();
            calendarMonth = d.getMonth();
            renderCalendar();
        }
    }

    function showEditForm(id) {
        const currentEntries = getCurrentEntries();
        const entry = currentEntries.find(e => e.id === id);
        if (!entry) return;

        tempImageData = entry.image;
        const mainPanel = document.getElementById('mainPanel');
        
        mainPanel.innerHTML = `
            <h2>Edit Page.${currentEntries.length - currentEntries.indexOf(entry)}</h2>
            <form id="diaryForm" onsubmit="saveEditDiary(event, ${id})">
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-date']}</span>
                    <input type="date" id="diaryDate" value="${entry.date}" required>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-weather']}</span>
                    <select id="diaryWeather">
                        <option value="☀️ Fine" ${entry.weather.includes('Fine')?'selected':''}>☀️ Fine</option>
                        <option value="☁️ Cloudy" ${entry.weather.includes('Cloudy')?'selected':''}>☁️ Cloudy</option>
                        <option value="☔ Rainy" ${entry.weather.includes('Rainy')?'selected':''}>☔ Rainy</option>
                        <option value="☃️ Snowy" ${entry.weather.includes('Snowy')?'selected':''}>☃️ Snowy</option>
                    </select>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-image']}</span>
                    <div class="image-preview-area" onclick="document.getElementById('diaryImage').click()">
                        <span id="previewPlaceholder" style="${entry.image?'display:none;':''}">Click to select an image</span>
                        <img id="imagePreview" src="${entry.image || ''}" style="${entry.image?'display:block;':'display:none;'}">
                    </div>
                    <input type="file" id="diaryImage" accept="image/*" style="display: none;" onchange="handleFileSelect('imagePreview', 'previewPlaceholder')">
                    <div style="margin-top:10px;">
                        <button type="button" class="delete-btn" style="padding:6px 12px;" onclick="removeImage()">Remove Photograph</button>
                    </div>
                </div>
                <div class="form-group">
                    <span class="editable-label">${labels['lbl-content']}</span>
                    <textarea id="diaryContent" required>${entry.content}</textarea>
                </div>
                <div class="action-buttons" style="border:none; padding:0; margin:0;">
                    <button type="submit">Save Changes</button>
                    <button type="button" class="delete-btn" style="padding:12px 20px; border-radius:2px;" onclick="viewDiary(${id})">Cancel</button>
                </div>
            </form>
        `;
    }

    function handleFileSelect(imgId, placeholderId) {
        const file = document.getElementById('diaryImage').files[0];
        const reader = new FileReader();
        reader.onloadend = function () {
            document.getElementById(imgId).src = reader.result;
            document.getElementById(imgId).style.display = 'block';
            document.getElementById(placeholderId).style.display = 'none';
            tempImageData = reader.result;
        }
        if (file) reader.readAsDataURL(file);
    }

    function removeImage() {
        tempImageData = "";
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('previewPlaceholder').style.display = 'block';
    }

    function saveNewDiary(e) {
        e.preventDefault();
        const newEntry = {
            id: Date.now(),
            date: document.getElementById('diaryDate').value,
            weather: document.getElementById('diaryWeather').value,
            image: tempImageData,
            content: document.getElementById('diaryContent').value
        };
        
        const nb = notebooks.find(n => n.id === currentNotebookId);
        if (nb) {
            nb.entries.unshift(newEntry);
            nb.entries.sort((a,b) => new Date(b.date) - new Date(a.date));
            saveAllData();
            viewDiary(newEntry.id);
        }
    }

    function saveEditDiary(e, id) {
        e.preventDefault();
        const currentEntries = getCurrentEntries();
        const entry = currentEntries.find(e => e.id === id);
        if (!entry) return;

        entry.date = document.getElementById('diaryDate').value;
        entry.weather = document.getElementById('diaryWeather').value;
        entry.content = document.getElementById('diaryContent').value;
        entry.image = tempImageData;

        const nb = notebooks.find(n => n.id === currentNotebookId);
        if (nb) {
            nb.entries.sort((a,b) => new Date(b.date) - new Date(a.date));
            saveAllData();
            viewDiary(id);
        }
    }

    function deleteEntry(id) {
        if (confirm('Are you sure you want to delete this entry?')) {
            const nb = notebooks.find(n => n.id === currentNotebookId);
            if (nb) {
                nb.entries = nb.entries.filter(entry => entry.id !== id);
                saveAllData();
                const currentEntries = getCurrentEntries();
                if (currentEntries.length > 0) {
                    viewDiary(currentEntries[0].id);
                } else {
                    showNewForm();
                }
            }
        }
    }

    // バックアップエクスポート (すべてのノートを包括)
    function exportData() {
        if (notebooks.length === 0) { alert("No data to export."); return; }
        const backupData = { version: "2.0", notebooks: notebooks };
        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `chronicle_multi_backup_${new Date().toISOString().substring(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // 復元インポート
    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        if (!confirm("データをインポートしますか？作成済みのすべての日記データが上書きされます。")) { input.value = ""; return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                
                // バージョン2（複数ノート）のデータ形式チェック
                if (importedData.notebooks && importedData.notebooks.length > 0) {
                    notebooks = importedData.notebooks;
                    currentNotebookId = notebooks[0].id;
                }
                // 旧バージョン（単一ノートのみ）の救済措置
                else if (importedData.entries) {
                    notebooks = [{ id: 'nb_default', name: '復元された日記', entries: importedData.entries }];
                    currentNotebookId = 'nb_default';
                } else {
                    alert("無効なファイル形式です。");
                    return;
                }

                saveAllData();
                renderTabs();
                refreshSidebar();
                
                const currentEntries = getCurrentEntries();
                if (currentEntries.length > 0) {
                    viewDiary(currentEntries[0].id);
                } else {
                    showNewForm();
                }
                alert("データを正常にインポートしました。");
            } catch (err) {
                alert("インポート中にエラーが発生しました。");
            }
            input.value = "";
        };
        reader.readAsText(file);
    }
</script>

</body>
</html>
